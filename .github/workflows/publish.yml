name: Publish Extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Verify pnpm
        run: pnpm --version

      - name: Set up Node.js with pnpm
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint code
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Test code
        run: pnpm test:run

      - name: Build the extension
        run: pnpm ext:build

      - name: Publish to Open VSX Registry
        if: env.OVSX_PAT != ''
        run: pnpm ovsx

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: pnpm vscode
